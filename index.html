<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>The UX Review Blog</title>

<body>
    <section class="hero container">
        <div class="hero-container" >
            <div class="trending-box">
                <p class="trending color-white text-xs fw-700 bg-black box-shadow-3">🔥TRENDING NOW</p>
            </div>
            <h1>
               <span class="color-black fs-h1"> BRUTAL</span> 
                <span class="color-red fs-h1">THOUGHTS  </span>      
                 <span class="color-bule fs-h1"> BOLD IDEAS </span>       
</h1>

          <div class="button-hero ">
            <button class="box-shado bg-black text-xl fw-700 border-4">
